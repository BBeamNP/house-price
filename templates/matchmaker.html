<!DOCTYPE html>
<html>
<head>
<title>NY Housing AI — Matchmaker</title>
<style>

*, *::before, *::after { box-sizing: border-box; }

body {
  font-family: Arial, sans-serif;
  background: #f8fafc;
  padding: 0;
  margin: 0;
  color: #1e293b;
}

/* NAV */
nav {
  background: #0f172a;
  padding: 0 32px;
  display: flex;
  align-items: center;
  height: 52px;
  border-bottom: 1px solid #1e293b;
}
nav .brand {
  color: white;
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 0.04em;
  margin-right: 32px;
  padding-right: 32px;
  border-right: 1px solid #334155;
  white-space: nowrap;
}
nav a {
  color: #94a3b8;
  text-decoration: none;
  font-size: 14px;
  font-weight: 500;
  padding: 0 16px;
  height: 52px;
  display: flex;
  align-items: center;
  border-bottom: 2px solid transparent;
  transition: color 0.15s, border-color 0.15s;
}
nav a:hover { color: white; }
nav a.active { color: white; border-bottom: 2px solid #3b82f6; }

/* PAGE */
.page {
  min-height: calc(100vh - 52px);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
}

.card {
  width: 100%;
  max-width: 520px;
  background: white;
  padding: 36px;
  border-radius: 16px;
  border: 1px solid #e2e8f0;
  box-shadow: 0 4px 24px rgba(0,0,0,0.06);
}

h2 {
  text-align: center;
  font-size: 20px;
  font-weight: 700;
  margin: 0 0 4px 0;
  color: #0f172a;
}

.subtitle {
  text-align: center;
  color: #64748b;
  font-size: 13px;
  margin: 0 0 28px 0;
}

.field {
  display: flex;
  flex-direction: column;
  margin-bottom: 14px;
}

label {
  font-size: 12px;
  font-weight: 600;
  color: #475569;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 6px;
}

input {
  width: 100%;
  padding: 10px 12px;
  border: 1px solid #cbd5e1;
  border-radius: 8px;
  font-size: 14px;
  color: #1e293b;
  background: white;
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
}
input:focus {
  border-color: #3b82f6;
  box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
  background: white;
}

button {
  width: 100%;
  padding: 12px;
  background: #1d4ed8;
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 6px;
  transition: background 0.15s;
}
button:hover { background: #1e40af; }

.result {
  margin-top: 18px;
  padding: 18px;
  background: #f8fafc;
  border: 1px solid #e2e8f0;
  border-radius: 10px;
  text-align: center;
  display: none;
}

.result-label {
  font-size: 15px;
  color: #475569;
  margin-bottom: 6px;
}

.result-score {
  font-size: 32px;
  font-weight: 700;
  margin-bottom: 12px;
}

.score-bar-wrap {
  background: #e2e8f0;
  border-radius: 99px;
  height: 10px;
  overflow: hidden;
}

.score-bar {
  height: 10px;
  border-radius: 99px;
  transition: width 0.6s ease;
}

</style>
</head>
<body>

<nav>
  <span class="brand">NY Housing AI</span>
  <a href="/">Deal Hunter</a>
  <a href="/matchmaker" class="active">Matchmaker</a>
  <a href="/goldmine">Gold Mine Map</a>
</nav>

<div class="page"><div class="card">

  <h2>Property Matchmaker</h2>
  <p class="subtitle">See how well a listing's price and size compare to the market</p>

  <div class="field">
    <label>Budget / Listing Price ($)</label>
    <input id="price" type="number" placeholder="e.g. 850000">
  </div>

  <div class="field">
    <label>Square Feet</label>
    <input id="sqft" type="number" placeholder="e.g. 1200">
  </div>

  <button onclick="getMatch()">Find Match Score</button>

  <div class="result" id="result">
    <div class="result-label" id="result-label"></div>
    <div class="result-score" id="result-score"></div>
    <div class="score-bar-wrap">
      <div class="score-bar" id="score-bar" style="width:0%"></div>
    </div>
  </div>

</div></div>

<script>
async function getMatch(){
  let price = document.getElementById("price").value
  let sqft  = document.getElementById("sqft").value

  if(!price || !sqft){
    alert("Please enter both price and square feet.")
    return
  }

  let response = await fetch(`/roi?price=${price}&sqft=${sqft}`, { method: "POST" })
  let data = await response.json()
  let score = data.roi_prediction[0]

  let color = score >= 70 ? "#16a34a" : score >= 40 ? "#d97706" : "#dc2626"
  let label = score >= 70 ? "Great Match" : score >= 40 ? "Fair Match" : "Poor Match"

  let el = document.getElementById("result")
  el.style.display = "block"
  document.getElementById("result-label").innerText = label
  document.getElementById("result-score").innerHTML = `<span style="color:${color}">${score.toFixed(1)}%</span>`
  document.getElementById("score-bar").style.width   = score + "%"
  document.getElementById("score-bar").style.background = color
}
</script>

</body>
</html>
