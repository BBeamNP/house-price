<!DOCTYPE html>
<html>

<head>
  <title>NY Housing AI — Matchmaker</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #f8fafc;
      padding: 0;
      margin: 0;
      color: #1e293b;
    }

    /* NAV */
    nav {
      background: #0f172a;
      padding: 0 32px;
      display: flex;
      align-items: center;
      height: 52px;
      border-bottom: 1px solid #1e293b;
    }

    nav .brand {
      color: white;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.04em;
      margin-right: 32px;
      padding-right: 32px;
      border-right: 1px solid #334155;
      white-space: nowrap;
    }

    nav a {
      color: #94a3b8;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      padding: 0 16px;
      height: 52px;
      display: flex;
      align-items: center;
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
    }

    nav a:hover {
      color: white;
    }

    nav a.active {
      color: white;
      border-bottom: 2px solid #3b82f6;
    }

    /* PAGE */
    .page {
      min-height: calc(100vh - 52px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .card {
      width: 100%;
      max-width: 520px;
      background: white;
      padding: 36px;
      border-radius: 16px;
      border: 1px solid #e2e8f0;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
    }

    h2 {
      text-align: center;
      font-size: 20px;
      font-weight: 700;
      margin: 0 0 4px 0;
      color: #0f172a;
    }

    .subtitle {
      text-align: center;
      color: #64748b;
      font-size: 13px;
      margin: 0 0 28px 0;
    }

    .field {
      display: flex;
      flex-direction: column;
      margin-bottom: 14px;
    }

    label {
      font-size: 12px;
      font-weight: 600;
      color: #475569;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font-size: 14px;
      color: #1e293b;
      background: white;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    input:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
      background: white;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #1d4ed8;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 6px;
      transition: background 0.15s;
    }

    button:hover {
      background: #1e40af;
    }

    .result {
      margin-top: 18px;
      padding: 18px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      text-align: center;
      display: none;
    }

    .result-label {
      font-size: 16px;
      font-weight: 700;
      text-align: center;
    }

    .matches {
      margin-top: 18px;
      display: none;
    }

    .matches-title {
      font-size: 13px;
      font-weight: 600;
      color: #475569;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 10px;
    }

    .match-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 14px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      margin-bottom: 8px;
      background: white;
      font-size: 13px;
    }

    .match-price {
      font-weight: 700;
      color: #0f172a;
      font-size: 14px;
    }

    .match-meta {
      color: #64748b;
    }

    .match-score-badge {
      font-size: 12px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 99px;
      background: #f1f5f9;
      color: #475569;
    }
  </style>
</head>

<body>

  <nav>
    <span class="brand">NY Housing AI</span>
    <a href="/">Deal Hunter</a>
    <a href="/matchmaker" class="active">Matchmaker</a>
    <a href="/goldmine">Gold Mine Map</a>
  </nav>

  <div class="page">
    <div class="card">

      <h2>Property Matchmaker</h2>
      <p class="subtitle">See how well a listing's price and size compare to the market</p>

      <div class="field">
        <label>Budget / Listing Price ($)</label>
        <input id="price" type="number" placeholder="e.g. 850000">
      </div>

      <div class="field">
        <label>Square Feet</label>
        <input id="sqft" type="number" placeholder="e.g. 1200">
      </div>

      <div class="field">
        <label>Bedrooms</label>
        <input id="beds" type="number" placeholder="e.g. 2">
      </div>

      <div class="field">
        <label>Bathrooms</label>
        <input id="bath" type="number" step="0.5" placeholder="e.g. 1">
      </div>

      <div class="field">
        <label>Distance to Center (miles)</label>
        <input id="distance" type="number" step="0.1" placeholder="e.g. 3.0">
      </div>

      <button onclick="getMatch()">Find Match Score</button>

      <div class="result" id="result">
        <div class="result-label" id="result-label"></div>
      </div>

      <div class="matches" id="matches">
        <div class="matches-title">Top Matching Properties</div>
        <div id="matches-list"></div>
      </div>

    </div>
  </div>

  <script>
    async function getMatch() {
      let price = document.getElementById("price").value
      let sqft = document.getElementById("sqft").value
      let beds = document.getElementById("beds").value
      let bath = document.getElementById("bath").value
      let distance = document.getElementById("distance").value

      if (!price || !sqft || !beds || !bath || !distance) {
        alert("Please fill in all fields.")
        return
      }

      let response = await fetch(
        `/api/matchmaker?price=${price}&sqft=${sqft}&beds=${beds}&bath=${bath}&distance=${distance}`,
        { method: "POST" }
      )

      let data = await response.json()

      let topScore = data.top_matches[0].MATCH_SCORE
      let color = topScore >= 80 ? "#16a34a" : topScore >= 60 ? "#d97706" : "#dc2626"
      let label = topScore >= 80 ? "Excellent Match" : topScore >= 60 ? "Good Match" : "Weak Match"

      let el = document.getElementById("result")
      el.style.display = "block"
      document.getElementById("result-label").style.color = color
      document.getElementById("result-label").innerText = label

      let list = document.getElementById("matches-list")
      list.innerHTML = data.top_matches.map(m => {
        let s = m.MATCH_SCORE
        let badgeColor = s >= 80 ? "#16a34a" : s >= 60 ? "#d97706" : "#dc2626"
        return `
        <div class="match-row">
          <span class="match-price">$${m.PRICE.toLocaleString()}</span>
          <span class="match-meta">${m.BEDS}bd / ${m.BATH}ba</span>
          <span class="match-meta">${m.PROPERTYSQFT.toLocaleString()} sqft</span>
          <span class="match-meta">${m.DISTANCE_TO_CENTER.toFixed(1)} mi</span>
          <span class="match-meta">${m.SUBLOCALITY_CLEAN}</span>
          <span class="match-score-badge" style="color:${badgeColor}">${s.toFixed(1)}%</span>
        </div>`
      }).join("")

      document.getElementById("matches").style.display = "block"
    }
  </script>

</body>

</html>
